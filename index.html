<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tazcatclock-site | 虎斑喵喵的小站</title>
    <style>
        body {
            font-family: "Courier New", monospace;
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            background: #f0f4f8;
            color: #2d3748;
        }
        h1 {
            color: #3182ce;
            border-bottom: 3px solid #3182ce;
            padding-bottom: 10px;
        }
        .emoji-big {
            font-size: 100px;
            margin: 20px 0;
            animation: bounce 2s infinite;
        }
        .emoji-line {
            font-size: 24px;
            margin: 10px 0;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <h1>😸 tazcatclock-site 😸</h1>
    <div class="emoji-big">😸🆚🦔</div>
    <p>歡迎來到虎斑喵喵的 MIT 風格小站！</p>
    <p>這裡是我和我的小刺蝟的秘密基地 🐾</p>
    <div class="emoji-line">🦔</div>
</body>
</html>
